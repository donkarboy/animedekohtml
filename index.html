<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #player-frame {
            width: 100%; height: 100%; border: none;
            display: none; position: fixed; inset: 0;
        }
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; gap: 20px; z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #333;
            border-top-color: #e74c3c; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p { color: #aaa; font-size: 14px; letter-spacing: 0.05em; }
        #status { color: #555; font-size: 12px; margin-top: 4px; }
        #error-box {
            position: fixed; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: #0d0d0d;
            gap: 12px; padding: 24px; text-align: center;
        }
        #error-box h2 { color: #e74c3c; font-size: 18px; }
        #error-box p { color: #888; font-size: 13px; max-width: 500px; line-height: 1.6; word-break: break-all; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>Loading player…</p>
        <span id="status"></span>
    </div>

    <div id="error-box">
        <h2>Playback Error</h2>
        <p id="error-msg">Could not load the video.</p>
        <p id="error-detail" style="font-size:11px;color:#555;margin-top:8px;"></p>
    </div>

    <!-- iframe is injected after hash is resolved -->

    <script>
    const loader   = document.getElementById("loader");
    const statusEl = document.getElementById("status");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");
    const errorDet = document.getElementById("error-detail");

    function log(msg) { statusEl.textContent = msg; }

    function showError(msg, detail = "") {
        loader.style.display   = "none";
        errorBox.style.display = "flex";
        errorMsg.textContent   = msg;
        if (detail) errorDet.textContent = detail;
    }

    function extractHash(html) {
        const patterns = [
            /\/video\/([a-f0-9]{32})/i,
            /data[=:\s'"]+([a-f0-9]{32})/i,
            /hash[=:\s'"]+([a-f0-9]{32})/i,
            /['"]([a-f0-9]{32})['"]/,
            /src=['"][^'"]*\/([a-f0-9]{32})[^'"]*['"]/,
            /\b([a-f0-9]{32})\b/,
        ];
        for (const re of patterns) {
            const m = html.match(re);
            if (m) return m[1];
        }
        return null;
    }

    function playHash(hash) {
        const cdnUrl = `https://as-cdn21.top/video/${hash}`;
        log("Launching player…");

        const iframe = document.createElement("iframe");
        iframe.src              = cdnUrl;
        iframe.width            = "100%";
        iframe.height           = "100%";
        iframe.frameBorder      = "0";
        iframe.allowFullscreen  = true;
        iframe.referrerPolicy   = "no-referrer";
        iframe.sandbox          = "allow-scripts allow-same-origin allow-presentation";
        iframe.allow            = "fullscreen; encrypted-media; picture-in-picture; autoplay";
        iframe.style.cssText    = "position:fixed;inset:0;width:100%;height:100%;border:none;display:block;";

        iframe.onload = () => { loader.style.display = "none"; };
        document.body.appendChild(iframe);
    }

    async function getHash(embedUrl) {
        const proxies = [
            u => `https://corsproxy.io/?url=${encodeURIComponent(u)}`,
            u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
        ];

        for (let i = 0; i < proxies.length; i++) {
            try {
                log(`Fetching via proxy ${i + 1}…`);
                const res  = await fetch(proxies[i](embedUrl));
                const html = await res.text();
                const hash = extractHash(html);
                if (hash) return hash;
            } catch (_) {}
        }
        throw new Error("Could not extract stream hash from embed page.");
    }

    async function init() {
        const params   = new URLSearchParams(window.location.search);
        let tmdbId     = params.get("id");
        let episodeStr = params.get("ep");

        if (!tmdbId || !episodeStr) {
            const hm = window.location.hash.match(/\/?(\d+)\/([\d]+-[\d]+)/);
            if (hm) { tmdbId = hm[1]; episodeStr = hm[2]; }
        }

        if (!tmdbId || !episodeStr) {
            const redir = sessionStorage.getItem("gh_redirect");
            if (redir) {
                sessionStorage.removeItem("gh_redirect");
                const m = redir.match(/\/(\d+)\/([\d]+-[\d]+)/);
                if (m) { tmdbId = m[1]; episodeStr = m[2]; }
            }
        }

        if (!tmdbId || !episodeStr) {
            showError("No TMDB ID or episode found.", "Use ?id=31910&ep=1-25 or #/31910/1-25");
            return;
        }

        const embedUrl = `https://animedekho.app/embed/${tmdbId}/${episodeStr}`;

        try {
            const hash = await getHash(embedUrl);
            log("Hash: " + hash);
            playHash(hash);
        } catch (err) {
            showError(err.message);
        }
    }

    init();
    </script>
</body>
</html>
