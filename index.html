<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #player-frame { width: 100%; height: 100%; border: none; display: none; }
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; gap: 20px; z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #333;
            border-top-color: #e74c3c; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p { color: #aaa; font-size: 14px; letter-spacing: 0.05em; }
        #status { color: #555; font-size: 12px; margin-top: 4px; }
        #error-box {
            position: fixed; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: #0d0d0d;
            gap: 12px; padding: 24px; text-align: center;
        }
        #error-box h2 { color: #e74c3c; font-size: 18px; }
        #error-box p { color: #888; font-size: 13px; max-width: 500px; line-height: 1.6; word-break: break-all; }
        #debug-dump {
            display: none; position: fixed; inset: 0; overflow: auto;
            background: #111; color: #0f0; font-size: 11px; font-family: monospace;
            padding: 16px; white-space: pre-wrap; word-break: break-all; z-index: 99;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading player…</p>
        <span id="status"></span>
    </div>

    <div id="error-box">
        <h2>Playback Error</h2>
        <p id="error-msg">Could not load the video.</p>
        <p id="error-detail" style="font-size:11px;color:#555;margin-top:8px;"></p>
    </div>

    <!-- debug overlay – toggled with ?debug=1 -->
    <pre id="debug-dump"></pre>

    <iframe
        id="player-frame"
        allowfullscreen
        allow="autoplay; fullscreen; encrypted-media"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
    ></iframe>

    <script>
    const loader    = document.getElementById("loader");
    const statusEl  = document.getElementById("status");
    const frame     = document.getElementById("player-frame");
    const errorBox  = document.getElementById("error-box");
    const errorMsg  = document.getElementById("error-msg");
    const errorDet  = document.getElementById("error-detail");
    const debugDump = document.getElementById("debug-dump");

    const DEBUG = new URLSearchParams(window.location.search).get("debug") === "1";

    function log(msg) {
        statusEl.textContent = msg;
        if (DEBUG) debugDump.textContent += msg + "\n";
    }

    function showError(msg, detail = "") {
        loader.style.display   = "none";
        errorBox.style.display = "flex";
        errorMsg.textContent   = msg;
        if (detail) errorDet.textContent = detail;
        if (DEBUG) { debugDump.style.display = "block"; }
    }

    // ── proxy list – tried in order until one works ───────────────────────────
    const PROXIES = [
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
        url => `https://cors-anywhere.herokuapp.com/${url}`,
    ];

    async function proxyFetch(url, options = {}, proxyIndex = 0) {
        if (proxyIndex >= PROXIES.length) throw new Error("All proxies failed for: " + url);
        const proxied = PROXIES[proxyIndex](url);
        log(`Proxy ${proxyIndex + 1}: ${url.slice(0, 60)}…`);
        try {
            const res = await fetch(proxied, options);
            if (!res.ok && res.status !== 0) throw new Error(`HTTP ${res.status}`);
            return res;
        } catch (e) {
            log(`Proxy ${proxyIndex + 1} failed (${e.message}), trying next…`);
            return proxyFetch(url, options, proxyIndex + 1);
        }
    }

    // ── extract 32-char hex hash from HTML using many patterns ───────────────
    function extractHash(html) {
        if (DEBUG) {
            debugDump.style.display = "block";
            debugDump.textContent += "\n--- HTML SNIPPET (first 3000 chars) ---\n" + html.slice(0, 3000) + "\n---\n";
        }

        const patterns = [
            /\/video\/([a-f0-9]{32})/i,              // /video/<hash>
            /data[=:\s'"]+([a-f0-9]{32})/i,          // data=<hash> or data: '<hash>'
            /hash[=:\s'"]+([a-f0-9]{32})/i,          // hash=<hash>
            /['"]([a-f0-9]{32})['"]/,                 // any quoted 32-char hex string
            /src=['"][^'"]*\/([a-f0-9]{32})[^'"]*['"]/, // src=".../<hash>..."
            /\b([a-f0-9]{32})\b/,                     // bare 32-char hex anywhere
        ];

        for (const re of patterns) {
            const m = html.match(re);
            if (m) {
                log(`Hash found via pattern: ${re}`);
                if (DEBUG) debugDump.textContent += `Matched pattern: ${re}\nHash: ${m[1]}\n`;
                return m[1];
            }
        }
        return null;
    }

    async function getStream(embedUrl) {
        // 1. fetch embed page HTML
        log("Fetching embed page…");
        const htmlRes = await proxyFetch(embedUrl, {
            headers: { "Referer": "https://animedekho.app/" }
        });
        const html = await htmlRes.text();

        // 2. extract hash
        const hash = extractHash(html);
        if (!hash) {
            if (DEBUG) debugDump.textContent += "\n--- FULL HTML ---\n" + html + "\n";
            throw new Error("Stream hash not found in embed page.");
        }

        const cdnVideoUrl = `https://as-cdn21.top/video/${hash}`;
        log("Hash: " + hash);

        // 3. warm-up CDN page (non-fatal if it fails)
        try {
            log("Warming up CDN…");
            await proxyFetch(cdnVideoUrl, {
                headers: { "Referer": "https://animedekho.app/" }
            });
        } catch (_) {}

        // 4. call getVideo API
        log("Calling video API…");
        const apiUrl  = `https://as-cdn21.top/player/index.php?data=${hash}&do=getVideo`;
        const body    = new URLSearchParams({ hash, r: "https://animedekho.app/" });

        const apiRes  = await proxyFetch(apiUrl, {
            method : "POST",
            headers: {
                "Content-Type"     : "application/x-www-form-urlencoded; charset=UTF-8",
                "X-Requested-With" : "XMLHttpRequest",
                "Referer"          : "https://animedekho.app/"
            },
            body
        });

        const text = await apiRes.text();
        if (DEBUG) debugDump.textContent += "\nAPI raw response:\n" + text + "\n";

        let data;
        try { data = JSON.parse(text); }
        catch (e) { throw new Error("API returned non-JSON: " + text.slice(0, 200)); }

        if (!data.videoSource) throw new Error("No videoSource in API response.");

        return { cdnVideoUrl, videoSource: data.videoSource };
    }

    async function init() {
        if (DEBUG) { debugDump.style.display = "block"; }

        // ── resolve params ────────────────────────────────────────────────────
        const params   = new URLSearchParams(window.location.search);
        let tmdbId     = params.get("id");
        let episodeStr = params.get("ep");

        if (!tmdbId || !episodeStr) {
            const hm = window.location.hash.match(/\/?(\d+)\/([\d]+-[\d]+)/);
            if (hm) { tmdbId = hm[1]; episodeStr = hm[2]; }
        }

        if (!tmdbId || !episodeStr) {
            const redir = sessionStorage.getItem("gh_redirect");
            if (redir) {
                sessionStorage.removeItem("gh_redirect");
                const m = redir.match(/\/(\d+)\/([\d]+-[\d]+)/);
                if (m) { tmdbId = m[1]; episodeStr = m[2]; }
            }
        }

        if (!tmdbId || !episodeStr) {
            showError(
                "No TMDB ID or episode found.",
                "Use ?id=31910&ep=1-25  or  #/31910/1-25  or  add ?debug=1 for details."
            );
            return;
        }

        const embedUrl = `https://animedekho.app/embed/${tmdbId}/${episodeStr}`;
        if (DEBUG) debugDump.textContent += "Embed URL: " + embedUrl + "\n";

        try {
            const { cdnVideoUrl, videoSource } = await getStream(embedUrl);
            log("Playing…");

            // Prefer direct m3u8/mp4 via HTML5 video; fall back to iframe of CDN page
            if (videoSource && /\.(m3u8|mp4|webm)/.test(videoSource)) {
                // build a tiny self-contained player page as a blob and load in iframe
                const playerHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:#000}
video{width:100vw;height:100vh;display:block}</style></head><body>
<video src="${videoSource}" autoplay controls playsinline></video>
</body></html>`;
                frame.src = URL.createObjectURL(new Blob([playerHTML], { type: "text/html" }));
            } else {
                // load the CDN video page (has its own embedded player)
                frame.src = cdnVideoUrl;
            }

            frame.onload = () => {
                loader.style.display = "none";
                frame.style.display  = "block";
            };

        } catch (err) {
            showError(err.message, DEBUG ? "" : "Add ?debug=1 to the URL to see details.");
            if (DEBUG) debugDump.textContent += "\nERROR: " + err.message + "\n" + (err.stack || "");
        }
    }

    init();
    </script>
</body>
</html>
