<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
        #player-frame { width: 100%; height: 100%; border: none; display: none; }
        #loader {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000; gap: 20px; z-index: 10;
        }
        .spinner {
            width: 48px; height: 48px; border: 4px solid #333;
            border-top-color: #e74c3c; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loader p { color: #aaa; font-size: 14px; letter-spacing: 0.05em; }
        #status { color: #555; font-size: 12px; margin-top: 4px; }
        #error-box {
            position: fixed; inset: 0; display: none; flex-direction: column;
            align-items: center; justify-content: center; background: #0d0d0d;
            gap: 12px; padding: 24px; text-align: center;
        }
        #error-box h2 { color: #e74c3c; font-size: 18px; }
        #error-box p { color: #888; font-size: 13px; max-width: 500px; line-height: 1.6; word-break: break-all; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Loading player…</p>
        <span id="status"></span>
    </div>

    <div id="error-box">
        <h2>Playback Error</h2>
        <p id="error-msg">Could not load the video.</p>
        <p id="error-detail" style="font-size:11px;color:#555;margin-top:8px;"></p>
    </div>

    <iframe
        id="player-frame"
        allowfullscreen
        allow="autoplay; fullscreen; encrypted-media"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"
    ></iframe>

    <script>
    const loader   = document.getElementById("loader");
    const statusEl = document.getElementById("status");
    const frame    = document.getElementById("player-frame");
    const errorBox = document.getElementById("error-box");
    const errorMsg = document.getElementById("error-msg");
    const errorDet = document.getElementById("error-detail");

    function log(msg) { statusEl.textContent = msg; }

    function showError(msg, detail = "") {
        loader.style.display   = "none";
        errorBox.style.display = "flex";
        errorMsg.textContent   = msg;
        if (detail) errorDet.textContent = detail;
    }

    function extractHash(html) {
        const patterns = [
            /\/video\/([a-f0-9]{32})/i,
            /data[=:\s'"]+([a-f0-9]{32})/i,
            /hash[=:\s'"]+([a-f0-9]{32})/i,
            /['"]([a-f0-9]{32})['"]/,
            /src=['"][^'"]*\/([a-f0-9]{32})[^'"]*['"]/,
            /\b([a-f0-9]{32})\b/,
        ];
        for (const re of patterns) {
            const m = html.match(re);
            if (m) return m[1];
        }
        return null;
    }

    async function getStream(embedUrl) {
        // 1. Fetch embed page via proxy (needed for cross-origin HTML scraping)
        log("Fetching embed page…");
        const proxy = "https://api.allorigins.win/raw?url=";
        const htmlRes = await fetch(proxy + encodeURIComponent(embedUrl), {
            headers: { "Referer": "https://animedekho.app/" }
        });
        const html = await htmlRes.text();

        // 2. Extract hash
        const hash = extractHash(html);
        if (!hash) throw new Error("Stream hash not found in embed page.");
        log("Hash found: " + hash);

        // 3. Call the video API directly (no proxy) — same origin rules don't apply
        //    because as-cdn21.top serves CORS headers for XHR requests
        const apiUrl = `https://as-cdn21.top/player/index.php?data=${hash}&do=getVideo`;
        const body   = new URLSearchParams({ hash, r: "https://animedekho.app/" });

        log("Fetching video source…");
        const apiRes = await fetch(apiUrl, {
            method : "POST",
            headers: {
                "Content-Type"     : "application/x-www-form-urlencoded; charset=UTF-8",
                "X-Requested-With" : "XMLHttpRequest",
                "Referer"          : "https://animedekho.app/"
            },
            body
        });

        if (!apiRes.ok) throw new Error(`API error: ${apiRes.status}`);
        const text = await apiRes.text();

        let data;
        try { data = JSON.parse(text); }
        catch (e) { throw new Error("API returned non-JSON: " + text.slice(0, 200)); }

        const cdnVideoUrl = `https://as-cdn21.top/video/${hash}`;
        return { cdnVideoUrl, videoSource: data.videoSource || null };
    }

    async function init() {
        // Resolve TMDB ID + episode from URL
        const params   = new URLSearchParams(window.location.search);
        let tmdbId     = params.get("id");
        let episodeStr = params.get("ep");

        if (!tmdbId || !episodeStr) {
            const hm = window.location.hash.match(/\/?(\d+)\/([\d]+-[\d]+)/);
            if (hm) { tmdbId = hm[1]; episodeStr = hm[2]; }
        }

        if (!tmdbId || !episodeStr) {
            const redir = sessionStorage.getItem("gh_redirect");
            if (redir) {
                sessionStorage.removeItem("gh_redirect");
                const m = redir.match(/\/(\d+)\/([\d]+-[\d]+)/);
                if (m) { tmdbId = m[1]; episodeStr = m[2]; }
            }
        }

        if (!tmdbId || !episodeStr) {
            showError("No TMDB ID or episode found.", "Use ?id=31910&ep=1-25 or #/31910/1-25");
            return;
        }

        const embedUrl = `https://animedekho.app/embed/${tmdbId}/${episodeStr}`;

        try {
            const { cdnVideoUrl, videoSource } = await getStream(embedUrl);
            log("Starting playback…");

            // If we got a direct stream URL (m3u8/mp4), use native video element in iframe
            if (videoSource && /\.(m3u8|mp4|webm)/i.test(videoSource)) {
                const playerHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>*{margin:0;padding:0}body{background:#000}video{width:100vw;height:100vh;display:block}</style>
</head><body><video src="${videoSource}" autoplay controls playsinline></video></body></html>`;
                frame.src = URL.createObjectURL(new Blob([playerHTML], { type: "text/html" }));
            } else {
                // Fall back to loading the CDN video page directly — no proxy needed
                frame.src = cdnVideoUrl;
            }

            frame.onload = () => {
                loader.style.display = "none";
                frame.style.display  = "block";
            };

        } catch (err) {
            showError(err.message);
        }
    }

    init();
    </script>
</body>
</html>
